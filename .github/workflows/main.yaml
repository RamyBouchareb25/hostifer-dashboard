name: Hostifer App CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  GITHUB_SHORT_SHA: ${{ github.sha }}
  REPOSITORY_OWNER: ramybouchareb25
  REPOSITORY_NAME: hostifer-dashboard

jobs:
    build:
        name: 📦 Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            
            - name: 2. Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: 3. Cache Docker layers
              uses: actions/cache@v3
              with:
                path: /tmp/.buildx-cache
                key: ${{ runner.os }}-buildx-${{ github.sha }}
                restore-keys: |
                    ${{ runner.os }}-buildx-
            
            - name: 4. Log in to Github Container Registry
              uses: docker/login-action@v2
              with:
                registry: ghcr.io
                username: ${{ env.REPOSITORY_OWNER }}
                password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: 5. Build and Push Docker Image
              uses: docker/build-push-action@v4
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: |
                    ghcr.io/${{ env.REPOSITORY_OWNER }}/${{ env.REPOSITORY_NAME }}:${{ env.GITHUB_SHORT_SHA }}
                    ghcr.io/${{ env.REPOSITORY_OWNER }}/${{ env.REPOSITORY_NAME }}:latest
                cache-from: |
                    type=local,src=/tmp/.buildx-cache
                    type=registry,ref=ghcr.io/${{ env.REPOSITORY_OWNER }}/${{ env.REPOSITORY_NAME }}:latest
                cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
                build-args: |
                    BUILDKIT_INLINE_CACHE=1
            
            - name: 6. Move cache
              run: |
                rm -rf /tmp/.buildx-cache
                mv /tmp/.buildx-cache-new /tmp/.buildx-cache
    update-argocd:
        name: 🔄 Update ArgoCD
        runs-on: ubuntu-latest
        needs: build

        steps:
        - name: 1. Checkout ArgoCD Infrastructure Repository
          uses: actions/checkout@v4
          with:
            repository: ${{ env.REPOSITORY_OWNER }}/hostifer-gitops
            token: ${{ secrets.CI_PAT }}
        - name: 2. Update Image Tag in Deployment
          run: |
            sed -i "s|tag: .*|tag: \"${{ env.GITHUB_SHORT_SHA }}\"|g" charts/dashboard/values.yaml

        - name: 3. Commit and push changes
          uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: "feat(ci): Update deployment image tag to ${{ github.sha }}"